parameters:
  - name: platforms
    type: object
  - name: buildAndTest
    type: boolean
    default: true

stages:
  - stage: build
    displayName: Build and Test All Crates
    condition: eq(${{ parameters.buildAndTest }}, true)
    jobs:
    - ${{ each platform in parameters.platforms }}:
        - job: ${{ platform.name }}
          displayName: Build ${{ platform.name }}
          ${{ if eq(platform.poolName, 'AcesShared') }}:
            pool:
              name: ${{ platform.poolName }}
              demands:
              - ImageOverride -equals ACES_VM_SharedPool_Sequoia
              os: ${{ platform.os }}
          ${{ elseif and(eq(platform.arch, 'aarch64'), eq(platform.os, 'linux')) }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
              hostArchitecture: Arm64
          ${{ else }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
          variables:
            arch: ${{ platform.arch }}
          timeoutInMinutes: 60
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: "Upload Python wheels"
              condition: succeeded()
              targetPath: $(System.DefaultWorkingDirectory)/target/wheels
              artifactName: ${{ platform.name }}-wheels
          steps:
          - script: |
              sudo tdnf install binutils glibc-devel kernel-headers patchelf gcc python3-3.12.9 python3-pip-24.2 python3-devel-3.12.9 -y
            displayName: Install build tools and Python on Linux aarch64
            condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'), eq(variables['arch'], 'aarch64'))

          - ${{ if and(eq(platform.os, 'windows'), eq(platform.arch, 'aarch64')) }}:
              - pwsh: |
                  Write-Host "Downloading Python 3.11.9 for Windows ARM64..."
                  $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-arm64.exe"
                  $output = "$env:TEMP\python-3.11.9-arm64.exe"
                  Invoke-WebRequest -Uri $url -OutFile $output
                  
                  Write-Host "Installing Python..."
                  Start-Process -FilePath $output -ArgumentList "/quiet", "InstallAllUsers=1", "PrependPath=1", "Include_test=0" -Wait -NoNewWindow
                  
                  Write-Host "Finding Python installation..."
                  $pythonPath = Get-ChildItem -Path "C:\Program Files\Python*" -Directory | 
                                Where-Object { $_.Name -match "Python3\d+" } | 
                                Select-Object -First 1 -ExpandProperty FullName
                  
                  if ($pythonPath) {
                      Write-Host "Found Python at: $pythonPath"
                      $env:Path = "$pythonPath;$pythonPath\Scripts;$env:Path"
                      Write-Host "##vso[task.setvariable variable=PATH]$pythonPath;$pythonPath\Scripts;$env:PATH"
                      & "$pythonPath\python.exe" --version
                  } else {
                      Write-Error "Python installation not found"
                      exit 1
                  }
                displayName: Install Python 3.11 on Windows ARM64

          - ${{ if not(and(eq(platform.os, 'windows'), eq(platform.arch, 'aarch64'))) }}:
              - ${{ if not(and(eq(platform.os, 'linux'), eq(platform.arch, 'aarch64'))) }}:
                  - task: UsePythonVersion@0
                    inputs:
                      versionSpec: "3.11"
                    displayName: Use Python 3.11

          - bash: |
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake
              elif command -v tdnf >/dev/null 2>&1; then
                sudo tdnf install -y protobuf-compiler cmake
              elif command -v brew >/dev/null 2>&1; then
                brew install protobuf cmake
              fi
              protoc --version
              cmake --version
            displayName: Install protoc and cmake (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          - pwsh: |
              choco install -y protoc cmake --no-progress
              $env:Path = "C:\Program Files\CMake\bin;$env:Path"
              Write-Host "##vso[task.prependpath]C:\Program Files\CMake\bin"
              protoc --version
              cmake --version
            displayName: Install protoc and cmake (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          - task: RustInstaller@1
            inputs:
              rustVersion: ms-prod-$(RUST_TOOLCHAIN_VERSION)
              cratesIoFeedOverride: $(cratesIoFeedOverride)
              toolchainFeed: $(toolchainFeed)
            displayName: Install Rust toolchain

          - script: cargo build --workspace --exclude deq-runtime --release --all-features
            displayName: Build all crates (except deq-runtime)
            env:
              RUSTFLAGS: "-C target-cpu=native"

          - script: cargo build --package deq-runtime --release --features "cli simulator tesseract python"
            displayName: Build deq-runtime (library features only)
            env:
              RUSTFLAGS: "-C target-cpu=native"

          - script: cargo test --workspace --exclude deq-runtime --release
            displayName: Test all crates (except deq-runtime)
            env:
              RUSTFLAGS: "-C target-cpu=native"

          - script: cargo test --package deq-runtime --release --features "cli simulator tesseract python"
            displayName: Test deq-runtime
            env:
              RUSTFLAGS: "-C target-cpu=native"

          - task: PipAuthenticate@1
            inputs:
              artifactFeeds: $(pypiArtifactFeed)
            displayName: Authenticate pip with ADO feed

          - bash: |
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip
              pip install maturin
              cd binar/bindings/python
              maturin develop --release
              cd ../../..
              python -c "import binar; print('binar imported successfully')"
              cd deq/deq_runtime
              maturin develop --release
              cd ../..
              python -c "import deq_runtime; print('deq_runtime imported successfully')"
            displayName: Test binar + deq-runtime Python bindings (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          - pwsh: |
              python -m venv .venv
              .\.venv\Scripts\Activate.ps1
              pip install --upgrade pip
              pip install maturin
              cd binar\bindings\python
              maturin develop --release
              cd ..\..\..
              python -c "import binar; print('binar imported successfully')"
              cd deq\deq_runtime
              maturin develop --release
              cd ..\..
              python -c "import deq_runtime; print('deq_runtime imported successfully')"
            displayName: Test binar + deq-runtime Python bindings (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          - bash: |
              mkdir -p target/wheels

              # Set CPU target: x86-64-v3 for x86_64, native for ARM64
              if [ "$(arch)" = "aarch64" ] || [ "$(arch)" = "arm64" ]; then
                export RUSTFLAGS="-C target-cpu=native"
              else
                export RUSTFLAGS="-C target-cpu=x86-64-v3"
              fi

              source .venv/bin/activate
              cd binar/bindings/python
              maturin build --release --strip --out ../../../target/wheels
              cd ../../..

              cd deq/deq_runtime
              maturin build --release --strip --out ../../target/wheels
              cd ../..

              ls -la target/wheels/
            displayName: Build wheels (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')

          - pwsh: |
              if (!(Test-Path target\wheels)) { New-Item -ItemType Directory -Path target\wheels }

              # Set CPU target: x86-64-v3 for x86_64, native for ARM64
              if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") {
                $env:RUSTFLAGS = "-C target-cpu=native"
              } else {
                $env:RUSTFLAGS = "-C target-cpu=x86-64-v3"
              }

              .\.venv\Scripts\Activate.ps1
              cd binar\bindings\python
              maturin build --release --strip --out ..\..\..\target\wheels
              cd ..\..\..

              cd deq\deq_runtime
              maturin build --release --strip --out ..\..\target\wheels
              cd ..\..

              dir target\wheels
            displayName: Build wheels (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')

          - bash: |
              source .venv/bin/activate
              pip install build
              cd deq
              python -m build --sdist --wheel --outdir ../target/wheels
              cd ..
              ls -la target/wheels/
            displayName: Build deq pure-Python distributions
            condition: and(eq(variables['Agent.OS'], 'Linux'), eq(variables['arch'], 'x86_64'))
