parameters:
  - name: platforms
    type: object
  - name: buildAndTest
    type: boolean
    default: true

stages:
  - stage: build
    displayName: Build and Test All Crates
    condition: eq(${{ parameters.buildAndTest }}, true)
    jobs:
    - ${{ each platform in parameters.platforms }}:
        - job: ${{ platform.name }}
          displayName: Build ${{ platform.name }}
          ${{ if eq(platform.poolName, 'AcesShared') }}:
            pool:
              name: ${{ platform.poolName }}
              demands:
              - ImageOverride -equals ACES_VM_SharedPool_Sequoia
              os: ${{ platform.os }}
          ${{ elseif and(eq(platform.arch, 'aarch64'), eq(platform.os, 'linux')) }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
              hostArchitecture: Arm64
          ${{ else }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
          variables:
            arch: ${{ platform.arch }}
            # Portable RUSTFLAGS shared by test builds AND published wheels so the
            # binaries we test match the ones we ship. x86_64 picks the x86-64-v3
            # microarchitecture level (Westmere AES, AVX2); aarch64 enables the
            # AES extension that `gxhash` (via `ptr_hash 2`) requires.
            ${{ if eq(platform.arch, 'aarch64') }}:
              rustflagsPortable: "-C target-feature=+aes"
            ${{ else }}:
              rustflagsPortable: "-C target-cpu=x86-64-v3"
          timeoutInMinutes: 60
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: "Upload Python wheels"
              condition: succeeded()
              targetPath: $(System.DefaultWorkingDirectory)/target/wheels
              artifactName: ${{ platform.name }}-wheels
          steps:
          - template: _platform_setup_steps.yaml
            parameters:
              platform: ${{ platform }}

          - script: cargo build --workspace --exclude deq-runtime --release --all-features
            displayName: Build all crates (except deq-runtime)
            env:
              RUSTFLAGS: $(rustflagsPortable)

          # deq-runtime is built only as a Python wheel (via maturin below).
          # Skipping the standalone `cargo build` with cli/simulator/tesseract
          # features saves ~1-2 minutes per platform and is not on the wheel path.

          - script: cargo test --workspace --exclude deq-runtime --exclude binar-python --exclude paulimer-bindings --release
            displayName: Test all crates (except deq-runtime + Python shims)
            env:
              RUSTFLAGS: $(rustflagsPortable)

          # deq-runtime cargo tests are intentionally skipped in CI: this
          # pipeline only ships the Python wheel, and the test suite is
          # expensive (multi-minute coordinator/timing tests).  Local
          # `cargo test` covers it; the maturin build + `import deq_runtime`
          # smoke check (in the separate ${{ platform.name }}_deq_runtime
          # job below) is the only CI verification we need.

          - bash: |
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip
              pip install maturin pytest hypothesis more-itertools numpy

              cd binar/bindings/python
              maturin develop --release
              python -c "import binar; print('binar imported successfully')"
              python -m pytest tests/ -v
              cd ../../..

              cd paulimer/bindings/python
              maturin develop --release
              python -c "import paulimer; print('paulimer imported successfully')"
              python -m pytest tests/ -v
              cd ../../..
            displayName: Test binar + paulimer Python bindings (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - pwsh: |
              python -m venv .venv
              .\.venv\Scripts\Activate.ps1
              pip install --upgrade pip
              pip install maturin pytest hypothesis more-itertools numpy

              cd binar\bindings\python
              maturin develop --release
              python -c "import binar; print('binar imported successfully')"
              python -m pytest tests/ -v
              cd ..\..\..

              cd paulimer\bindings\python
              maturin develop --release
              python -c "import paulimer; print('paulimer imported successfully')"
              python -m pytest tests/ -v
              cd ..\..\..
            displayName: Test binar + paulimer Python bindings (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - bash: |
              mkdir -p target/wheels

              source .venv/bin/activate
              cd binar/bindings/python
              maturin build --release --strip --out ../../../target/wheels
              cd ../../..

              ls -la target/wheels/
            displayName: Build binar wheel (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - pwsh: |
              if (!(Test-Path target\wheels)) { New-Item -ItemType Directory -Path target\wheels }

              .\.venv\Scripts\Activate.ps1
              cd binar\bindings\python
              maturin build --release --strip --out ..\..\..\target\wheels
              cd ..\..\..

              dir target\wheels
            displayName: Build binar wheel (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - bash: |
              source .venv/bin/activate
              pip install build
              cd deq
              python -m build --sdist --wheel --outdir ../target/wheels
              cd ..
              ls -la target/wheels/
            displayName: Build deq pure-Python distributions
            condition: and(eq(variables['Agent.OS'], 'Linux'), eq(variables['arch'], 'x86_64'))

        # deq-runtime is built in its own per-platform job so its expensive
        # maturin build (stim C++ + LTO) gets a fresh 60-min budget rather
        # than competing with the binar/paulimer build+test job. Windows
        # ARM64 is skipped because `stim-cxx` vendors MSVC x86-only
        # intrinsics (_umul128 etc) and upstream stim has no win-arm64 wheel.
        - ${{ if not(and(eq(platform.os, 'windows'), eq(platform.arch, 'aarch64'))) }}:
          - job: ${{ platform.name }}_deq_runtime
            displayName: Build deq-runtime ${{ platform.name }}
            dependsOn: []
            ${{ if eq(platform.poolName, 'AcesShared') }}:
              pool:
                name: ${{ platform.poolName }}
                demands:
                - ImageOverride -equals ACES_VM_SharedPool_Sequoia
                os: ${{ platform.os }}
            ${{ elseif and(eq(platform.arch, 'aarch64'), eq(platform.os, 'linux')) }}:
              pool:
                name: ${{ platform.poolName }}
                image: ${{ platform.imageName }}
                os: ${{ platform.os }}
                hostArchitecture: Arm64
            ${{ else }}:
              pool:
                name: ${{ platform.poolName }}
                image: ${{ platform.imageName }}
                os: ${{ platform.os }}
            variables:
              arch: ${{ platform.arch }}
              ${{ if eq(platform.arch, 'aarch64') }}:
                rustflagsPortable: "-C target-feature=+aes"
              ${{ else }}:
                rustflagsPortable: "-C target-cpu=x86-64-v3"
            timeoutInMinutes: 60
            templateContext:
              outputs:
              - output: pipelineArtifact
                displayName: "Upload deq-runtime wheels"
                condition: succeeded()
                targetPath: $(System.DefaultWorkingDirectory)/target/wheels
                artifactName: ${{ platform.name }}-deq-runtime-wheels
            steps:
            - template: _platform_setup_steps.yaml
              parameters:
                platform: ${{ platform }}

            - bash: |
                set -euo pipefail
                mkdir -p target/wheels

                python3 -m venv .venv
                source .venv/bin/activate
                pip install --upgrade pip
                pip install maturin

                cd deq/deq_runtime
                maturin build --release --strip --out ../../target/wheels
                cd ../..

                ls -la target/wheels/
              displayName: Build deq-runtime wheel (Unix)
              condition: ne(variables['Agent.OS'], 'Windows_NT')
              env:
                RUSTFLAGS: $(rustflagsPortable)

            - pwsh: |
                if (!(Test-Path target\wheels)) { New-Item -ItemType Directory -Path target\wheels }

                python -m venv .venv
                .\.venv\Scripts\Activate.ps1
                pip install --upgrade pip
                pip install maturin

                cd deq\deq_runtime
                maturin build --release --strip --out ..\..\target\wheels
                cd ..\..

                dir target\wheels
              displayName: Build deq-runtime wheel (Windows)
              condition: eq(variables['Agent.OS'], 'Windows_NT')
              env:
                RUSTFLAGS: $(rustflagsPortable)
