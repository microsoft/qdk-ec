parameters:
  - name: platforms
    type: object
  - name: buildAndTest
    type: boolean
    default: true
  # Gate the (slow) deq-runtime wheel build separately from others
  - name: buildDeqRuntime
    type: boolean
    default: true
  # Gate the Pyodide / PyEmscripten (WASM) wheel build for binar/paulimer
  - name: buildWasm
    type: boolean
    default: true

stages:
  - stage: build
    displayName: Build and Test All Crates
    # Run the stage if either the main per-platform jobs or the deq-runtime
    # wheel jobs are requested. The main jobs always exist template-time and
    # carry their own runtime `condition` below, so they get skipped when
    # only deq-runtime is being built.
    condition: or(eq(${{ parameters.buildAndTest }}, true), eq(${{ parameters.buildDeqRuntime }}, true))
    jobs:
    - ${{ each platform in parameters.platforms }}:
        - job: ${{ platform.name }}
          displayName: Build ${{ platform.name }}
          condition: eq(${{ parameters.buildAndTest }}, true)
          ${{ if eq(platform.poolName, 'AcesShared') }}:
            pool:
              name: ${{ platform.poolName }}
              demands:
              - ImageOverride -equals ACES_VM_SharedPool_Sequoia
              os: ${{ platform.os }}
          ${{ elseif and(eq(platform.arch, 'aarch64'), eq(platform.os, 'linux')) }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
              hostArchitecture: Arm64
          ${{ else }}:
            pool:
              name: ${{ platform.poolName }}
              image: ${{ platform.imageName }}
              os: ${{ platform.os }}
          variables:
            arch: ${{ platform.arch }}
            # Portable RUSTFLAGS shared by test builds AND published wheels so the
            # binaries we test match the ones we ship. x86_64 picks the x86-64-v3
            # microarchitecture level (Westmere AES, AVX2); aarch64 enables the
            # AES extension that `gxhash` (via `ptr_hash 2`) requires.
            ${{ if eq(platform.arch, 'aarch64') }}:
              rustflagsPortable: "-C target-feature=+aes"
            ${{ else }}:
              rustflagsPortable: "-C target-cpu=x86-64-v3"
          timeoutInMinutes: 120
          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: "Upload Python wheels"
              condition: succeeded()
              targetPath: $(System.DefaultWorkingDirectory)/target/wheels
              artifactName: ${{ platform.name }}-wheels
          steps:
          - template: _platform_setup_steps.yaml
            parameters:
              platform: ${{ platform }}

          - script: cargo test --workspace --exclude deq-runtime --exclude binar-python --exclude paulimer-bindings --release --all-features
            displayName: Build and test all Rust crates (except deq-runtime + Python shims)
            env:
              RUSTFLAGS: $(rustflagsPortable)

          # The Python cdylib crates (binar-python, paulimer-bindings) are
          # intentionally excluded above. They are built exactly once by
          # `maturin build` below, which produces both the wheel artifact and
          # the cdylib that gets `pip install`-ed for pytest. Doing a
          # separate `cargo build --workspace --all-features` or a separate
          # `maturin develop` step would compile the same cdylib a second
          # (or third) time — costly on Windows ARM64 where release builds
          # use LTO + codegen-units=1.

          # deq-runtime cargo tests are intentionally skipped in CI: this
          # pipeline only ships the Python wheel, and the test suite is
          # expensive (multi-minute coordinator/timing tests).  Local
          # `cargo test` covers it; the maturin build + `import deq_runtime`
          # smoke check (in the separate ${{ platform.name }}_deq_runtime
          # job below) is the only CI verification we need.

          - bash: |
              set -euo pipefail
              mkdir -p target/wheels

              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip
              pip install maturin pytest hypothesis more-itertools numpy

              for crate in binar paulimer; do
                pushd "$crate/bindings/python"
                maturin build --release --strip --out ../../../target/wheels
                popd
                pip install --force-reinstall --no-deps target/wheels/${crate/-/_}*.whl
                python -c "import ${crate/-/_}; print('${crate} imported successfully')"
                python -m pytest "$crate/bindings/python/tests/" -v
              done

              ls -la target/wheels/
            displayName: Build + test binar/paulimer wheels (Unix)
            condition: ne(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - pwsh: |
              $ErrorActionPreference = "Stop"
              if (!(Test-Path target\wheels)) { New-Item -ItemType Directory -Path target\wheels | Out-Null }

              python -m venv .venv
              .\.venv\Scripts\Activate.ps1
              pip install --upgrade pip
              pip install maturin pytest hypothesis more-itertools numpy

              foreach ($crate in @('binar', 'paulimer')) {
                Push-Location "$crate\bindings\python"
                maturin build --release --strip --out ..\..\..\target\wheels
                if ($LASTEXITCODE -ne 0) { throw "maturin build failed for $crate" }
                Pop-Location
                $module = $crate -replace '-', '_'
                $wheel = Get-ChildItem -Path target\wheels -Filter "$module-*.whl" | Select-Object -First 1 -ExpandProperty FullName
                pip install --force-reinstall --no-deps $wheel
                python -c "import $module; print('$crate imported successfully')"
                python -m pytest "$crate\bindings\python\tests" -v
                if ($LASTEXITCODE -ne 0) { throw "pytest failed for $crate" }
              }

              dir target\wheels
            displayName: Build + test binar/paulimer wheels (Windows)
            condition: eq(variables['Agent.OS'], 'Windows_NT')
            env:
              RUSTFLAGS: $(rustflagsPortable)

          - bash: |
              source .venv/bin/activate
              pip install build
              cd deq
              python -m build --sdist --wheel --outdir ../target/wheels
              cd ..
              ls -la target/wheels/
            displayName: Build deq pure-Python distributions
            condition: and(eq(variables['Agent.OS'], 'Linux'), eq(variables['arch'], 'x86_64'))

        # deq-runtime is built in its own per-platform job so its expensive
        # maturin build (stim C++ + LTO) gets a fresh 60-min budget rather
        # than competing with the binar/paulimer build+test job. Windows
        # ARM64 is skipped because `stim-cxx` vendors MSVC x86-only
        # intrinsics (_umul128 etc) and upstream stim has no win-arm64 wheel.
        - ${{ if and(eq(parameters.buildDeqRuntime, true), not(and(eq(platform.os, 'windows'), eq(platform.arch, 'aarch64')))) }}:
          - job: ${{ platform.name }}_deq_runtime
            displayName: Build deq-runtime ${{ platform.name }}
            dependsOn: []
            ${{ if eq(platform.poolName, 'AcesShared') }}:
              pool:
                name: ${{ platform.poolName }}
                demands:
                - ImageOverride -equals ACES_VM_SharedPool_Sequoia
                os: ${{ platform.os }}
            ${{ elseif and(eq(platform.arch, 'aarch64'), eq(platform.os, 'linux')) }}:
              pool:
                name: ${{ platform.poolName }}
                image: ${{ platform.imageName }}
                os: ${{ platform.os }}
                hostArchitecture: Arm64
            ${{ else }}:
              pool:
                name: ${{ platform.poolName }}
                image: ${{ platform.imageName }}
                os: ${{ platform.os }}
            variables:
              arch: ${{ platform.arch }}
              ${{ if eq(platform.arch, 'aarch64') }}:
                rustflagsPortable: "-C target-feature=+aes"
              ${{ else }}:
                rustflagsPortable: "-C target-cpu=x86-64-v3"
            timeoutInMinutes: 120
            templateContext:
              outputs:
              - output: pipelineArtifact
                displayName: "Upload deq-runtime wheels"
                condition: succeeded()
                targetPath: $(System.DefaultWorkingDirectory)/target/wheels
                artifactName: ${{ platform.name }}-deq-runtime-wheels
            steps:
            - template: _platform_setup_steps.yaml
              parameters:
                platform: ${{ platform }}

            - bash: |
                set -euo pipefail
                mkdir -p target/wheels

                python3 -m venv .venv
                source .venv/bin/activate
                pip install --upgrade pip
                pip install maturin

                cd deq/deq_runtime
                maturin build --release --strip --out ../../target/wheels
                cd ../..

                ls -la target/wheels/
              displayName: Build deq-runtime wheel (Unix)
              condition: ne(variables['Agent.OS'], 'Windows_NT')
              env:
                RUSTFLAGS: $(rustflagsPortable)
                # Workspace `[profile.release]` sets `lto = true` +
                # `codegen-units = 1`, which during the final cdylib link
                # holds the entire crate graph (including stim's vendored
                # C++) in a single rustc process. On the Linux ARM64 1ES
                # agent (~8 GB RAM) this OOMs (SIGKILL on the rustc invoke
                # for `deq-runtime` lib). Use thin LTO + multiple codegen
                # units for the CI wheel build only: peak memory drops
                # roughly proportionally to codegen-units, with a small
                # (~5-10%) runtime penalty.
                CARGO_PROFILE_RELEASE_LTO: "thin"
                CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

            - pwsh: |
                if (!(Test-Path target\wheels)) { New-Item -ItemType Directory -Path target\wheels }

                python -m venv .venv
                .\.venv\Scripts\Activate.ps1
                pip install --upgrade pip
                pip install maturin

                cd deq\deq_runtime
                maturin build --release --strip --out ..\..\target\wheels
                cd ..\..

                dir target\wheels
              displayName: Build deq-runtime wheel (Windows)
              condition: eq(variables['Agent.OS'], 'Windows_NT')
              env:
                RUSTFLAGS: $(rustflagsPortable)
                # See the Unix step for the rationale. Windows agents have
                # more RAM but the same setting also speeds up the build
                # (parallel codegen) on every platform.
                CARGO_PROFILE_RELEASE_LTO: "thin"
                CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

    # Pyodide / PyEmscripten (WASM) wheels for binar + paulimer. These are
    # cross-compiled (not per-host), so a single Linux x86_64 job emits both
    # wheels for the pyemscripten_2026_0 ABI (Python 3.14 / Pyodide 314.x).
    # Independent of the native matrix above (dependsOn: []) and gated by
    # `buildWasm`. The older pyemscripten_2025_0 / Python 3.13 release is not
    # targeted: its pinned nightly Rust cannot compile the current sources.
    - ${{ if eq(parameters.buildWasm, true) }}:
      - job: wasm_wheels
        displayName: Build WASM wheels (binar/paulimer)
        dependsOn: []
        pool:
          name: "Azure-Pipelines-DevTools-EO"
          image: "ubuntu-latest"
          os: linux
        timeoutInMinutes: 120
        templateContext:
          outputs:
          - output: pipelineArtifact
            displayName: "Upload WASM wheels"
            condition: succeeded()
            targetPath: $(System.DefaultWorkingDirectory)/target/wheels
            artifactName: wasm-wheels
        steps:
        - template: ../templates/build-wasm-wheels-steps.yaml
          parameters:
            pythonVersion: "3.14"
