name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test - ${{ matrix.os }} - ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Show toolchain details
        run: |
          rustup --version
          cargo --version
          rustc --version
          rustc --print target-cpus
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Install just
        uses: extractions/setup-just@v2
      
      - name: Create Python virtual environment and install dependencies (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          python -m venv qdk_env
          source qdk_env/bin/activate
          python -m pip install --upgrade pip
          pip install maturin
      
      - name: Create Python virtual environment and install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m venv qdk_env
          call qdk_env\Scripts\activate.bat
          python -m pip install --upgrade pip
          pip install maturin
      
      - name: Run CI checks (Linux/Mac)
        if: matrix.toolchain == 'stable' && runner.os != 'Windows'
        run: |
          source qdk_env/bin/activate
          just ci
        env:
          RUSTFLAGS: -C target-cpu=native
      
      - name: Run CI checks (Windows)
        if: matrix.toolchain == 'stable' && runner.os == 'Windows'
        shell: bash
        run: |
          source qdk_env/Scripts/activate
          just ci
        env:
          RUSTFLAGS: -C target-cpu=native -C linker=rust-lld

