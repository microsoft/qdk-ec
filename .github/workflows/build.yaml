name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test - ${{ matrix.os }} - ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        toolchain: [stable]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cmake
        uses: lukka/get-cmake@latest
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Show toolchain details
        run: |
          rustup --version
          cargo --version
          rustc --version
          rustc --print target-cpus
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: Create Python virtual environment and install dependencies (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          python -m venv qdk_env
          source qdk_env/bin/activate
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio hypothesis more-itertools
      
      - name: Create Python virtual environment and install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m venv qdk_env
          call qdk_env\Scripts\activate.bat
          python -m pip install --upgrade pip
          pip install maturin pytest pytest-asyncio hypothesis more-itertools
      
      - name: Build binar Python bindings (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: binar/bindings/python
        env:
          RUSTFLAGS: ${{ runner.os == 'macOS' && '-C target-feature=+aes' || '-C target-cpu=x86-64-v3' }}
        run: |
          source ../../../qdk_env/bin/activate
          maturin develop --release
      
      - name: Build binar Python bindings (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: binar/bindings/python
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
        run: |
          call ..\..\..\qdk_env\Scripts\activate.bat
          maturin develop --release
      
      - name: Build paulimer Python bindings (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: paulimer/bindings/python
        env:
          RUSTFLAGS: ${{ runner.os == 'macOS' && '-C target-feature=+aes' || '-C target-cpu=x86-64-v3' }}
        run: |
          source ../../../qdk_env/bin/activate
          maturin develop --release
      
      - name: Build paulimer Python bindings (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: paulimer/bindings/python
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
        run: |
          call ..\..\..\qdk_env\Scripts\activate.bat
          maturin develop --release

      - name: Build deq-runtime Python bindings (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: deq/deq_runtime
        env:
          RUSTFLAGS: ${{ runner.os == 'macOS' && '-C target-feature=+aes' || '-C target-cpu=x86-64-v3' }}
        run: |
          source ../../qdk_env/bin/activate
          maturin develop --release
          python -c "import deq_runtime; print('deq_runtime imported successfully')"

      - name: Build deq-runtime Python bindings (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: deq/deq_runtime
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v3"
        run: |
          call ..\..\qdk_env\Scripts\activate.bat
          maturin develop --release
          python -c "import deq_runtime; print('deq_runtime imported successfully')"

      - name: Install deq pure-Python package (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: deq
        run: |
          source ../qdk_env/bin/activate
          pip install -e '.[render]'
          playwright install --with-deps chromium

      - name: Install deq pure-Python package (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: deq
        run: |
          call ..\qdk_env\Scripts\activate.bat
          pip install -e .[render]
          playwright install chromium

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build deq visualizer frontend bundle
        shell: bash
        working-directory: deq/deq_visualizer
        run: |
          npm install --ignore-scripts
          npm run protoc
          npx vite build --emptyOutDir
          test -f ../deq/visual/static/lib.js || { echo "lib.js was not produced by vite build"; exit 1; }

      - name: Check tutorial examples and highlights are up to date
        if: runner.os == 'Linux'
        shell: bash
        working-directory: deq
        run: |
          source ../qdk_env/bin/activate
          pushd documents/tutorial/scripts
          npm install --ignore-scripts
          python run_generators.py
          python highlight_deq.py
          rm -rf node_modules
          popd
          git diff --exit-code -- documents/tutorial/ ':!documents/tutorial/scripts/package-lock.json' || {
            echo "::error::Tutorial examples or highlights are out of date. Run 'python run_generators.py && python highlight_deq.py' in deq/documents/tutorial/scripts and commit the changes."
            exit 1
          }

      - name: Run stubtest for binar (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: binar/bindings/python
        run: |
          source ../../../qdk_env/bin/activate
          pip install mypy
          python -m mypy.stubtest binar --allowlist stubtest_allowlist.txt

      - name: Run stubtest for binar (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: binar/bindings/python
        run: |
          call ..\..\..\qdk_env\Scripts\activate.bat
          pip install mypy
          python -m mypy.stubtest binar --allowlist stubtest_allowlist.txt

      - name: Run stubtest for paulimer (Linux/Mac)
        if: runner.os != 'Windows'
        working-directory: paulimer/bindings/python
        run: |
          source ../../../qdk_env/bin/activate
          pip install mypy
          python -m mypy.stubtest paulimer --allowlist stubtest_allowlist.txt

      - name: Run stubtest for paulimer (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        working-directory: paulimer/bindings/python
        run: |
          call ..\..\..\qdk_env\Scripts\activate.bat
          pip install mypy
          python -m mypy.stubtest paulimer --allowlist stubtest_allowlist.txt

      - name: Run tests (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          source qdk_env/bin/activate
          cargo test --workspace --exclude deq-runtime --all-features --release
          cargo test --package deq-runtime --features "cli simulator tesseract python" --release
          pytest deq/tests
      
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call qdk_env\Scripts\activate.bat
          cargo test --workspace --exclude deq-runtime --all-features --release
          cargo test --package deq-runtime --features "cli simulator tesseract python" --release
          pytest deq\tests
      
      - name: Check clippy (stable only)
        if: matrix.toolchain == 'stable'
        run: |
          cargo clippy --workspace --exclude deq-runtime --all-targets --all-features -- -D clippy::pedantic
          cargo clippy --package deq-runtime --all-targets --features "cli simulator tesseract python" -- -D warnings
      
      - name: Check formatting (stable only)
        if: matrix.toolchain == 'stable'
        run: cargo fmt --all -- --check
      
      - name: Build benchmarks (stable only)
        if: matrix.toolchain == 'stable'
        run: |
          cargo bench --package binar --no-run
          cargo bench --package paulimer --no-run
          cargo bench --package deq-runtime --no-run
